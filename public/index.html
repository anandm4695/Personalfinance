<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0F0F1A" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#F8F9FA" media="(prefers-color-scheme: light)" />
  <meta name="description" content="Personal Finance Dashboard — Track your net worth, investments, expenses, credit cards, loans, taxes and financial goals in one place." />
  <meta name="keywords" content="personal finance, net worth tracker, investment tracker, SIP, mutual funds, tax calculator, budget, India" />
  <meta name="author" content="Finance Dashboard" />

  <!-- Open Graph -->
  <meta property="og:title" content="Personal Finance Dashboard" />
  <meta property="og:description" content="Track your net worth, investments, expenses and financial goals — all in one secure place." />
  <meta property="og:type" content="website" />

  <!-- Apple PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Finance" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- Prevent phone number detection -->
  <meta name="format-detection" content="telephone=no" />

  <title>Finance Dashboard</title>

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>₹</text></svg>" />

  <!-- Preconnect to Google Fonts for faster load -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Load fonts with display=swap for performance -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    /* Critical inline CSS — eliminates FOUC */
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0F0F1A;
      color: #E8EAED;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    #root { min-height: 100vh; }

    /* App loading shimmer shown before JS hydrates */
    #app-loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0F0F1A;
      z-index: 9999;
      gap: 20px;
      transition: opacity 0.4s ease;
    }
    #app-loading.hidden { opacity: 0; pointer-events: none; }
    .loading-logo {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      background: linear-gradient(135deg, #4F6BFF, #818CF8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 0 40px rgba(79,107,255,0.35);
      animation: pulse 2s ease-in-out infinite;
    }
    .loading-bar {
      width: 200px;
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
    }
    .loading-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #4F6BFF, #818CF8, #4F6BFF);
      background-size: 200%;
      border-radius: 2px;
      animation: shimmer 1.5s linear infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(79,107,255,0.35); }
      50% { transform: scale(1.05); box-shadow: 0 0 60px rgba(79,107,255,0.5); }
    }
    @keyframes shimmer {
      0% { background-position: 200% center; }
      100% { background-position: -200% center; }
    }
  </style>
</head>

<body>
  <!-- Splash screen — hidden once React mounts -->
  <div id="app-loading">
    <div class="loading-logo">₹</div>
    <div class="loading-bar"><div class="loading-bar-fill"></div></div>
  </div>

  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>

  <script>
    // Hide splash once React root renders
    const observer = new MutationObserver(() => {
      const root = document.getElementById('root');
      if (root && root.children.length > 0) {
        const splash = document.getElementById('app-loading');
        if (splash) { splash.classList.add('hidden'); setTimeout(() => splash.remove(), 500); }
        observer.disconnect();
      }
    });
    observer.observe(document.getElementById('root'), { childList: true });
  </script>
</body>

</html>
